name: pulsecheck
description: >
  PulseCheck — a lightweight, offline, no-account fingertip camera
  heart-rate and HRV wellness app. Not a medical device.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.6
  shared_preferences: ^2.3.2
  cupertino_icons: ^1.0.8
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.4
  fl_chart: ^0.68.0
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  pdf: ^3.11.1
  csv: ^6.0.0
  share_plus: ^10.0.2
  health: ^10.2.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
