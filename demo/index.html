<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spider Swing — Remake Preview</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="phone">
    <div id="bezel">
      <div id="screen">
        <div id="boot">
          <div class="boot-brand">SPIDER SWING</div>
          <div class="boot-sub">Remade from scratch · 3D</div>
        </div>
        <canvas id="c"></canvas>
        <div id="hud">
          <div class="top">
            <div class="brand">SPIDER SWING</div>
            <div id="status">Ready to swing</div>
            <div class="row">
              <span id="swings">Swings  0</span>
              <span id="speed">0 m/s</span>
            </div>
          </div>
          <div id="stick"><div id="knob"></div></div>
          <button id="jump" type="button">↑</button>
          <div id="hint">Hold right → web</div>
          <div id="reticle"></div>
        </div>
      </div>
    </div>
  </div>
  <script type="importmap">
  { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js" } }
  </script>
  <script type="module" src="js/game.js"></script>
</body>
</html>
