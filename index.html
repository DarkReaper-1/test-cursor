<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spider-Man Web Swing</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="ui">
    <h1>Spider-Man Web Swing</h1>
    <p class="controls">
      <kbd>A</kbd>/<kbd>D</kbd> or <kbd>←</kbd>/<kbd>→</kbd> move &nbsp;·&nbsp;

      <kbd>Release</kbd> let go

    <p id="status">Swing through the city!</p>
  </div>
  <canvas id="game"></canvas>
  <script src="js/game.js"></script>

</html>
